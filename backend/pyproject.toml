[project]
name = "backend"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "alembic>=1.14.0",
    "celery[redis]>=5.4.0",
    "dotenv>=0.9.9",
    "fastapi>=0.138.2",
    "psycopg[binary]>=3.3.4",
    "pydantic>=2.13.4",
    "redis>=6.4.0",
    "sqlmodel>=0.0.39",
    "uvicorn[standard]>=0.49.0",
]

[dependency-groups]
dev = [
    "httpx>=0.28.1",
    "mypy>=2.1.0",
    "pre-commit>=4.6.0",
    "pytest>=9.1.1",
    "ruff>=0.15.20",
]

[tool.ruff]
target-version = "py314"
line-length = 100
# pipeline/ scripts import siblings (the script dir is on sys.path at runtime).
src = ["api", "pipeline", "tasks"]
# Autogenerated Alembic migrations: machine output, not hand-maintained style.
# env.py stays linted (it's hand-written).
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = [
    "E", "F", "W",   # pyflakes / pycodestyle
    "I",             # import sorting
    "UP",            # pyupgrade
    "B",             # bugbear
    "SIM",           # simplify
    "BLE",           # blind except
    "RUF",           # ruff-specific
]
# print() allowed in pipeline CLI scripts (stdout is the chainable artefact);
# forbidden in the API layer (use logging there).
[tool.ruff.lint.per-file-ignores]
"pipeline/*" = ["T201"]

[tool.mypy]
python_version = "3.14"
strict = true
# psycopg/urllib third-party stubs are partial; siblings resolved via runtime sys.path.
ignore_missing_imports = true
explicit_package_bases = true
mypy_path = "pipeline"
files = ["api", "pipeline", "tasks"]

[tool.pytest.ini_options]
# tests/ mirrors api/ and pipeline/; pipeline scripts import siblings, so the
# pipeline dir is on sys.path for tests just like at runtime. "." puts the backend
# root on the path so `api` is importable as a package (api uses relative imports).
testpaths = ["tests"]
pythonpath = [".", "pipeline", "api"]
addopts = "-ra"
