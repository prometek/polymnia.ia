# Fast safety net (a few seconds). Type check + tests run in CI, not here.
# Install:  uv run pre-commit install --install-hooks --hook-type commit-msg
default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
        exclude: ^inputs/voice_sample\.wav$  # TTS voice-clone sample, intentional input
      - id: check-yaml
      - id: check-toml

  # Lint + format Python (auto-fix).
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format

  # Secret detection.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  # Conventional Commits message validation.
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.2.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
