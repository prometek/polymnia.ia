name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Sync deps (uses .python-version → 3.14)
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check

      - name: Type check (mypy strict)
        run: uv run mypy

      - name: Tests
        run: uv run pytest

  render-motor:
    name: render-motor (typescript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: render-motor
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: render-motor/package-lock.json

      # Pin npm to the version that generated package-lock.json. Older npm
      # mishandles esbuild 0.28's openharmony optional platform dep.
      - name: Pin npm
        run: npm install -g npm@11.18.0

      - name: Install deps
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Tests
        run: npm test

  render-image:
    name: render-motor image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Validate the render worker image builds (no push).
      - name: Build render image
        run: docker build -t polymnia-render:ci render-motor
