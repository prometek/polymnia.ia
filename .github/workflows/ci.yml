name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: polymnia
        ports:
          - 5432:5432
        # Wait until the DB accepts connections before the job runs.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      # Broker for the job queue (api/celery_app.py) *and*, since issue #17, the
      # shared counter behind per-user rate limiting (api/rate_limit.py) — tests
      # exercising the job-triggering endpoints now need a reachable Redis.
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Sync deps (uses .python-version → 3.14)
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check

      - name: Ruff format check
        run: uv run ruff format --check

      - name: Type check (mypy strict)
        run: uv run mypy

      - name: Migrations apply + no schema drift
        # Runs on the pristine `polymnia` service DB (tests use a sibling
        # `polymnia_test`, so this database is never touched by pytest).
        #   1. `upgrade head` fails if any migration is broken.
        #   2. `check` autogenerates against SQLModel.metadata and fails if it
        #      would emit any operation — i.e. a model changed without a
        #      matching migration (silent schema ↔ model drift).
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/polymnia
        run: |
          uv run alembic upgrade head
          uv run alembic check

      - name: Tests
        # DB-touching tests derive an isolated <db>_test from this URL (conftest).
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/polymnia
          REDIS_URL: redis://localhost:6379/0
        run: uv run pytest

  render-motor:
    name: render-motor (typescript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: render-motor
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: render-motor/package-lock.json

      # Pin npm to the version that generated package-lock.json. Older npm
      # mishandles esbuild 0.28's openharmony optional platform dep.
      - name: Pin npm
        run: npm install -g npm@11.18.0

      - name: Install deps
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Tests
        run: npm test

  render-image:
    name: render-motor image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Validate the render worker image builds (no push).
      - name: Build render image
        run: docker build -t polymnia-render:ci render-motor
